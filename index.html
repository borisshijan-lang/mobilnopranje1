<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilno Pranje PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins,sans-serif;background:#0f0f0f;color:#fff;margin:0;scroll-behavior:smooth}
a{text-decoration:none;color:inherit}
.nav-links a{margin-left:20px;cursor:pointer}
.btn{background:#00c2ff;padding:12px 25px;border-radius:30px;cursor:pointer;border:none;transition:.3s;}
.btn:hover{background:#0090cc}

/* Modal Styles */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center; align-items:center;
  z-index:10000;
}
.modal-content{
  background:#111;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  position:relative;
}
.close-btn{
  position:absolute;
  top:15px; right:15px;
  font-size:20px;
  cursor:pointer;
}

/* Inputs */
input,select{padding:10px;border-radius:8px;border:none;width:100%;margin:10px 0;font-size:16px}
#calendar{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:15px}
.time-slot{padding:10px;border-radius:8px;cursor:pointer;transition:.3s;}
.time-slot.available{background:#1f7a1f}
.time-slot.available:hover{background:#28a828}
.time-slot.booked{background:#7a1f1f;cursor:not-allowed;color:#ccc}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<nav style="padding:20px;background:#000;display:flex;justify-content:space-between;align-items:center;">
  <div class="logo" style="font-weight:700;font-size:22px">MobilnoPranje</div>
  <div class="nav-links">
    <a onclick="openBooking()">Zakazivanje</a>
  </div>
</nav>

<section style="text-align:center;padding:100px 20px;">
  <h1>Mobilno pranje vozila</h1>
  <p>Radno vreme 17:00 – 22:00</p>
  <button class="btn" onclick="openBooking()">Zakaži odmah</button>
</section>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeBooking()">&times;</span>
    <h2>Zakazivanje termina</h2>
    <select id="packageSelect">
      <option value="60">Basic (60 min)</option>
      <option value="90">Standard (90 min)</option>
      <option value="120">Premium (120 min)</option>
    </select>
    <input type="date" id="datePicker">
    <div id="calendar"></div>
  </div>
</div>

<script>
// --- Firebase Setup ---
const firebaseConfig = {
  apiKey: "AIzaSyC10IWy6vUrqwIXtugXSdQoXEoaeKlcFu0",
  authDomain: "mobilnopranje-d60f6.firebaseapp.com",
  databaseURL: "https://mobilnopranje-d60f6-default-rtdb.firebaseio.com",
  projectId: "mobilnopranje-d60f6",
  storageBucket: "mobilnopranje-d60f6.appspot.com",
  messagingSenderId: "862210046561",
  appId: "1:862210046561:web:a073eb551cdff9199dc820"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- Modal Functions ---
const modal = document.getElementById("bookingModal");
function openBooking(){ modal.style.display = "flex"; }
function closeBooking(){ modal.style.display = "none"; }

// --- Calendar Booking ---
const startHour = 17;
const endHour = 22;
const calendar = document.getElementById("calendar");
const datePicker = document.getElementById("datePicker");
const packageSelect = document.getElementById("packageSelect");

datePicker.addEventListener("change", loadSlots);
packageSelect.addEventListener("change", loadSlots);

function loadSlots(){
  calendar.innerHTML = "";
  const date = datePicker.value;
  const duration = parseInt(packageSelect.value);
  if(!date) return;

  db.ref("bookings").once("value", snap=>{
    let dayBookings = [];
    snap.forEach(s => { if(s.val().date === date) dayBookings.push(s.val()); });

    for(let h=startHour; h<endHour; h++){
      for(let m of [0,30]){
        let start = h*60 + m;
        let end = start + duration;
        if(end > endHour*60) continue;

        let clash = dayBookings.some(b => start < (b.time + b.duration) && end > b.time);
        let slot = document.createElement("div");
        slot.classList.add("time-slot");
        slot.innerText = `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
        if(clash){ slot.classList.add("booked"); }
        else{
          slot.classList.add("available");
          slot.onclick = ()=>bookSlot(date, start, duration);
        }
        calendar.appendChild(slot);
      }
    }
  });
}

function bookSlot(date, time, duration){
  const packageName = packageSelect.options[packageSelect.selectedIndex].text;
  db.ref("bookings").push({date,time,duration,package:packageName});
  alert("Termin rezervisan!");
  window.open(`https://wa.me/381668009318?text=Rezervacija ${date} Paket: ${packageName}`);
  loadSlots();
}

// --- Close modal on outside click ---
window.onclick = function(event){
  if(event.target === modal){ closeBooking(); }
}
</script>

</body>
</html>
